<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pricing Monitor{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">💲 Pricing Monitor</a>
    <nav>
      <a href="{{ url_for('index') }}">{{ t('nav.overview') }}</a>
      <a href="{{ url_for('changes') }}">{{ t('nav.changes') }}</a>
      <a href="{{ url_for('runs') }}">{{ t('nav.runs') }}</a>
      <a href="{{ url_for('companies_page') }}">{{ t('nav.companies') }}</a>
      <a href="{{ url_for('compare_page') }}">{{ t('nav.compare') }}</a>
      <a href="{{ url_for('howto') }}">{{ t('nav.howto') }}</a>
    </nav>
    <div class="lang-toggle">
      <a href="{{ url_for('set_lang', code='ko') }}" class="{{ 'on' if lang == 'ko' else '' }}">한</a>
      <span>|</span>
      <a href="{{ url_for('set_lang', code='en') }}" class="{{ 'on' if lang == 'en' else '' }}">EN</a>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <span>{{ t('footer.note') }}</span>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
